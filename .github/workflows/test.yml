name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          path: hermes-agent
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: hermes-agent/pyproject.toml
      - name: Install Hermes and test dependencies
        run: python -m pip install -e ./hermes-agent pytest pytest-asyncio aiohttp
      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          HERMES_AGENT_PATH: ${{ github.workspace }}/hermes-agent
